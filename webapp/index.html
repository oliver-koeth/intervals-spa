<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intervals</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="theme-dark">
    <header class="topbar">
      <div class="brand">Intervals</div>
      <nav class="nav">
        <button class="nav-btn" data-screen-target="search">Search</button>
        <button class="nav-btn" data-screen-target="intervals">Intervals</button>
        <button class="nav-btn" data-screen-target="settings">Settings</button>
      </nav>
      <button id="theme-toggle" class="btn secondary">Light mode</button>
    </header>

    <main class="container">
      <section id="screen-search" class="screen active">
        <div class="card">
          <h1>Search Intervals</h1>
          <p class="muted">Searches intervals.icu and returns matching intervals.</p>

          <form id="search-form" class="form-grid">
            <label>
              Label
              <input id="search-label" type="text" placeholder="e.g. fahrtkopf" />
            </label>
            <label>
              Activity type
              <select id="search-type">
                <option value="">All types</option>
                <option value="Run">Run</option>
                <option value="VirtualRun">Virtual Run</option>
              </select>
            </label>
            <label>
              Time target (mm:ss)
              <input id="search-time" type="text" placeholder="e.g. 03:00" />
            </label>
            <label>
              Margin (mm:ss)
              <input id="search-margin" type="text" placeholder="e.g. 00:10" />
            </label>
            <label>
              Date from
              <input id="search-from" type="date" />
            </label>
            <label>
              Date to
              <input id="search-to" type="date" />
            </label>
            <div class="form-actions">
              <button type="submit" id="search-submit" class="btn primary">Search</button>
              <button type="reset" class="btn secondary">Reset</button>
            </div>
          </form>

          <p id="search-status" class="muted" style="margin-top: 0.75rem"></p>
        </div>
      </section>

      <section id="screen-intervals" class="screen">
        <div class="card">
          <div class="row space-between">
            <h1>Intervals</h1>
            <div id="result-summary" class="muted"></div>
          </div>

          <div class="filters">
            <label>
              Label
              <input id="filter-label" type="text" placeholder="e.g. fahrtkopf" />
            </label>
            <label>
              Activity type
              <select id="filter-type">
                <option value="">All types</option>
                <option value="Run">Run</option>
                <option value="VirtualRun">Virtual Run</option>
              </select>
            </label>
            <label>
              Time from (mm:ss)
              <input id="filter-time-from" type="text" placeholder="22:00" />
            </label>
            <label>
              Time to (mm:ss)
              <input id="filter-time-to" type="text" placeholder="27:00" />
            </label>
            <label>
              Date from
              <input id="filter-date-from" type="date" />
            </label>
            <label>
              Date to
              <input id="filter-date-to" type="date" />
            </label>
            <div class="form-actions">
              <button id="apply-filters" class="btn secondary" type="button">Apply</button>
              <button id="clear-filters" class="btn secondary" type="button">Clear</button>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Type</th>
                  <th>Activity</th>
                  <th>Label</th>
                  <th class="right">Time</th>
                  <th class="right">Avg HR</th>
                  <th class="right">Max HR</th>
                  <th class="right">Zone</th>
                </tr>
              </thead>
              <tbody id="intervals-body"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="screen-settings" class="screen">
        <div class="card">
          <h1>Settings</h1>
          <p class="muted">Saved in browser local storage.</p>

          <form id="settings-form" class="form-grid" style="max-width: 540px">
            <label>
              Athlete ID
              <input id="settings-athlete-id" type="text" placeholder="e.g. i75074" />
            </label>
            <label>
              API Key
              <input id="settings-api-key" type="password" placeholder="intervals.icu API key" />
            </label>
            <label>
              API mode
              <select id="settings-api-mode">
                <option value="auto">Auto (recommended)</option>
                <option value="proxy">Local proxy (/api/search)</option>
                <option value="direct">Direct intervals.icu</option>
              </select>
            </label>
            <div class="form-actions">
              <button type="submit" class="btn primary">Save</button>
              <button type="button" id="settings-clear" class="btn secondary">Clear</button>
            </div>
          </form>

          <p id="settings-status" class="muted" style="margin-top: 0.75rem"></p>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
